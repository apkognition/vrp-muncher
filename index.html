<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/dist/styles.css">
    <title>VRP URL Muncher</title>
</head>

<body
    class="min-h-screen m-0 bg-[#245483] bg-linear-to-b from-[#245483] to-[#060d1c] font-sans antialiased text-slate-200">
    <div class="flex flex-col items-center justify-center min-h-screen px-4">
        <div class="w-full max-w-2xl space-y-8">

            <div class="text-center space-y-2">
                <h1 class="text-3xl font-black tracking-tighter text-white uppercase italic">VRP Muncher</h1>
            </div>

            <div
                class="group relative flex items-center w-full bg-[#1a1a1a]/80 backdrop-blur-sm rounded-xl border border-white/5 p-1 shadow-2xl transition-all focus-within:border-sky-500/50">
                <input
                    class="w-full p-3 bg-transparent rounded-xl border-0 text-white focus:outline-none placeholder-zinc-600 font-mono text-sm"
                    type="text" placeholder="e.g., https://gofile.io/d/FbRr0Da" name="url-input-box" id="url-input">
                <button
                    class="px-6 py-2.5 rounded-lg bg-sky-500 text-white font-black hover:bg-sky-400 active:scale-95 transition-all cursor-pointer shadow-lg shadow-sky-500/20"
                    id="munch-button">
                    MUNCH
                </button>
            </div>

            <div class="space-y-3">
                <div
                    class="flex items-center w-full bg-[#1a1a1a]/80 backdrop-blur-sm rounded-xl border border-white/5 p-1 shadow-2xl">
                    <input class="w-full p-3 bg-transparent border-0 text-sky-400 focus:outline-none font-mono text-sm"
                        type="text" placeholder="Munched result..." name="url-output-box" id="url-output" readonly>

                    <div class="flex items-center gap-1">
                        <button
                            class="px-4 py-2.5 text-xs font-bold uppercase tracking-wider bg-slate-800 text-slate-400 hover:bg-slate-700 hover:text-slate-200 active:scale-95 rounded-lg transition-all cursor-pointer"
                            id="copy-button">
                            COPY
                        </button>
                        <button
                            class="px-6 py-2.5 rounded-lg bg-sky-600 text-white font-bold hover:bg-sky-500 active:scale-95 transition-all cursor-pointer border-t border-white/10"
                            id="copy-embedded-button">
                            EMBED
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/dist/main.js"></script>
</body>

</html>
